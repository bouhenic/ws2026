<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Météo — Lycée Newton</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>🌤️ Station Météo LoRaWAN</h1>
        <p class="subtitle">Lycée Newton — Clichy <span id="last-update"></span></p>
    </header>

    <main>
        <section id="cards" class="cards"></section>

        <section class="chart-section">
            <div class="chart-controls">
                <select id="field-select"></select>
                <div id="duration-buttons" class="duration-buttons">
                    <button data-duration="-1h">1h</button>
                    <button data-duration="-6h">6h</button>
                    <button data-duration="-24h" class="active">24h</button>
                    <button data-duration="-7d">7j</button>
                    <button data-duration="-30d">30j</button>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="chart"></canvas>
            </div>
        </section>
    </main>

    <footer>
        <a href="/api-docs" target="_blank">Documentation API</a>
        · <button id="reset-key" class="link-button">Changer la clé API</button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
